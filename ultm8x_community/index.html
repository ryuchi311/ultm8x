<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="icon" type="image/x-icon" href="assets/ultm8x.ico">

        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap"

</head>

<body class="bg-black text-white font-['Inter'] overflow-x-hidden">
    <!-- Particle Background -->
    <div id="particle-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <!-- Mouse Spotlight -->
    <div id="mouse-spotlight"
        class="fixed inset-0 pointer-events-none z-[1] opacity-0 transition-opacity duration-1000"></div>

    <!-- Custom Cursor -->
    <div class="cursor-dot fixed pointer-events-none z-[999] opacity-0"></div>
    <div class="cursor-outline fixed pointer-events-none z-[998] opacity-0"></div>

    <main class="relative z-10 h-screen flex flex-col items-center justify-center py-4 px-4">

        <!-- Hero Section -->

                Join the

                Digizens Community

                </div>
            </a>

            <!-- Telegram -->
            <a href="https://t.me/ultm8xdigizenscommunity" target="_blank" class="social-card group">
                <div class="card-inner">

                        </svg>

                    <span
                        class="text-xs md:text-[10px] uppercase tracking-[0.1em] font-bold text-gray-400 group-hover:text-white transition-colors">Telegram</span>
                </div>

            <a href="https://www.facebook.com/ultm8x/" target="_blank" class="social-card group">

            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@ultm8x.trading" target="_blank" class="social-card group">
                <div class="card-inner">
                    <div class="icon-box">
                        <svg class="w-7 h-7" viewBox="0 0 24 24" fill="currentColor">
